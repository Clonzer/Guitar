<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FretForge - Strum Hero</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-white">
<nav class="bg-black/90 backdrop-blur sticky top-0 z-50 border-b border-amber-400/30">
  <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
    <h1 class="text-4xl font-black text-amber-400">FRET FORGE</h1>
    <div class="flex gap-8 text-lg">
      <a href="index.html">Home</a>
      <a href="chords.html">Chords</a>
      <a href="tuner.html">Tuner</a>
      <a href="strum-hero.html" class="text-amber-400">Strum Hero</a>
      <a href="songs.html">Songs</a>
    </div>
  </div>
</nav>

<div class="max-w-5xl mx-auto px-6 py-12 text-center">
  <h2 class="text-6xl font-black mb-8">Strum Hero</h2>
  <p class="text-xl mb-8">Tap/click/spacebar in time with falling chords. Miss and game stops!</p>
  
  <div class="flex justify-center gap-8 mb-8 flex-wrap">
    <div class="flex items-center gap-4">
      <label class="text-lg">Speed:</label>
      <input type="range" id="speedSlider" min="1" max="10" value="5" class="w-48 accent-amber-400">
      <span id="speedValue">5</span>
    </div>
    <button id="startBtn" class="px-12 py-5 bg-green-600 hover:bg-green-500 font-bold text-xl rounded-3xl transition">START GAME</button>
  </div>
  
  <canvas id="gameCanvas" width="800" height="600" class="mx-auto bg-zinc-900 block rounded-3xl glow"></canvas>
  <div class="text-4xl font-bold mt-6" id="score">Score: 0</div>
</div>

<script src="js/strum-hero.js"></script>
</body>
</html>
