<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FretForge - Tuner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col">
<nav class="bg-black/90 backdrop-blur sticky top-0 z-50 border-b border-amber-400/30">
  <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
    <h1 class="text-4xl font-black text-amber-400">FRET FORGE</h1>
    <div class="flex gap-8 text-lg">
      <a href="index.html">Home</a>
      <a href="chords.html">Chords</a>
      <a href="tuner.html" class="text-amber-400">Tuner</a>
      <a href="strum-hero.html">Strum Hero</a>
      <a href="songs.html">Songs</a>
    </div>
  </div>
</nav>

<div class="flex-1 flex flex-col lg:flex-row max-w-7xl mx-auto w-full p-6 gap-8">
  <!-- Left: Controls -->
  <div class="lg:w-1/3 bg-zinc-900 rounded-3xl p-10 glow flex flex-col">
    <h2 class="text-5xl font-black mb-10 text-center">Live Tuner</h2>
    
    <select id="micSelect" class="mb-8"></select>
    
    <div class="space-y-8 flex-1">
      <div>
        <label class="block text-amber-300 text-sm mb-3">Sensitivity</label>
        <input type="range" id="sensitivity" min="10" max="100" value="50" class="w-full">
      </div>
      <div>
        <label class="block text-amber-300 text-sm mb-3">Noise Reduction</label>
        <input type="range" id="noise" min="10" max="100" value="40" class="w-full">
      </div>
    </div>

    <button id="tunerBtn" onclick="toggleTuner()" 
            class="w-full py-8 bg-gradient-to-r from-amber-400 to-orange-500 text-black font-black text-3xl rounded-3xl hover:scale-105 transition mt-auto">
      START TUNER
    </button>
  </div>

  <!-- Right: Instrument Diagram + Feedback -->
  <div class="lg:w-2/3 bg-zinc-900 rounded-3xl p-8 glow flex flex-col">
    <div id="tuningBar" class="h-12 bg-zinc-800 rounded-2xl mb-6 flex items-center justify-center text-xl font-bold"></div>
    
    <canvas id="instrumentCanvas" class="w-full bg-black rounded-2xl" width="700" height="380"></canvas>
    
    <div id="stringFeedback" class="mt-6 text-center text-2xl font-bold text-amber-400"></div>
  </div>
</div>

<script src="js/tuner.js"></script>
</body>
</html>
