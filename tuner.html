<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FretForge - Tuner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-white">
<nav class="bg-black/90 backdrop-blur sticky top-0 z-50 border-b border-amber-400/30">
  <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between">
    <h1 class="text-4xl font-black text-amber-400">FRET FORGE</h1>
    <div class="flex gap-8 text-lg">
      <a href="index.html">Home</a>
      <a href="chords.html">Chords</a>
      <a href="tuner.html" class="text-amber-400">Tuner</a>
      <a href="strum-hero.html">Strum Hero</a>
      <a href="songs.html">Songs</a>
    </div>
  </div>
</nav>

<div class="max-w-2xl mx-auto px-6 py-12">
  <h2 class="text-5xl font-bold mb-8 text-center">Advanced Tuner</h2>
  
  <div class="bg-zinc-900 rounded-3xl p-10 glow">
    <select id="micSelect" class="w-full bg-zinc-800 p-5 rounded-2xl text-lg mb-8" onchange="changeMic()"></select>

    <div class="grid grid-cols-2 gap-6 mb-8">
      <div>
        <label class="block text-sm mb-2">Sensitivity</label>
        <input type="range" id="sensitivity" min="10" max="100" value="50" class="w-full accent-amber-400">
      </div>
      <div>
        <label class="block text-sm mb-2">Noise Reduction</label>
        <input type="range" id="noise" min="10" max="100" value="40" class="w-full accent-amber-400">
      </div>
    </div>

    <button onclick="toggleTuner()" id="tunerBtn" class="w-full py-8 bg-amber-400 hover:bg-amber-300 text-black font-bold text-3xl rounded-3xl mb-8 transition">START TUNER</button>

    <div class="h-8 bg-zinc-800 rounded-2xl overflow-hidden mb-4">
      <div id="micLevel" class="h-full bg-gradient-to-r from-green-400 to-amber-400 w-0 transition-all"></div>
    </div>

    <label class="flex items-center gap-4 text-lg">
      <input type="checkbox" id="liveListen" class="w-6 h-6 accent-amber-400"> Live Listening (hear yourself)
    </label>
  </div>
</div>

<script src="js/tuner.js"></script>
</body>
</html>
