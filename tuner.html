<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FretForge - Tuner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col">
<nav class="bg-black/90 backdrop-blur sticky top-0 z-50 border-b border-amber-400/30">
  <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
    <h1 class="text-4xl font-black text-amber-400">FRET FORGE</h1>
    <div class="flex gap-8 text-lg">
      <a href="index.html">Home</a>
      <a href="chords.html">Chords</a>
      <a href="tuner.html" class="text-amber-400">Tuner</a>
      <a href="strum-hero.html">Strum Hero</a>
      <a href="songs.html">Songs</a>
    </div>
  </div>
</nav>

<div class="flex-1 flex items-center justify-center p-6 max-w-2xl mx-auto w-full">
  <div class="w-full bg-zinc-900 rounded-3xl p-10 glow">
    <h2 class="text-5xl font-black text-center mb-10">Advanced Tuner</h2>
    
    <select id="micSelect" class="mb-8"></select>

    <div class="grid grid-cols-2 gap-8 mb-10">
      <div>
        <label class="block text-amber-300 text-sm mb-3">Sensitivity</label>
        <input type="range" id="sensitivity" min="10" max="100" value="50" class="w-full accent-amber-400">
      </div>
      <div>
        <label class="block text-amber-300 text-sm mb-3">Noise Reduction</label>
        <input type="range" id="noise" min="10" max="100" value="40" class="w-full accent-amber-400">
      </div>
    </div>

    <button id="tunerBtn" onclick="toggleTuner()" 
            class="w-full py-8 bg-gradient-to-r from-amber-400 to-orange-500 text-black font-black text-3xl rounded-3xl hover:scale-105 transition mb-8">
      START TUNER
    </button>

    <div class="h-8 bg-zinc-800 rounded-2xl overflow-hidden mb-3">
      <div id="micLevel" class="h-full bg-gradient-to-r from-green-400 via-amber-400 to-red-500 transition-all w-0"></div>
    </div>
    <div class="flex justify-between text-xs text-zinc-400"><span>Quiet</span><span>Loud</span></div>

    <label class="flex items-center gap-4 mt-8 text-lg">
      <input type="checkbox" id="liveListen" class="w-6 h-6 accent-amber-400"> Live Listening (hear yourself)
    </label>
  </div>
</div>

<script src="js/tuner.js"></script>
</body>
</html>
